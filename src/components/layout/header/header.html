<header data-fls-header class="header">
	<div class="header__container">
		<div class="header__body">

			<if condition="'[[home]]' === 'true'">
				<img class="header__logo" src="@img/logo.png" alt="Logo">

			</if>
			<else>
				<a href="index.html" class="header__link-logo">
					<img class="header__logo" src="@img/logo.png" alt="Logo">
				</a>
			</else>
			<include src="@components/layout/menu/menu.html" locals='{"active":"[[active]]"}'></include>
			<button type="button" data-fls-menu class="icon-menu"><span></span></button>
		</div>
	</div>
</header>
