<!-- ============================================================ -->
<!-- Section: Browse by category (Gallery)                        -->
<!-- ============================================================ -->
<section class="gallery" id="categories">
  <div class="gallery__container">
    <!-- Section heading -->
    <div class="gallery__head">
      <div data-fls-blockhead class="blockhead blockhead--title-gallery-2">
        <h2 class="blockhead__title">Browse Zyro products by category</h2>
      </div>
    </div>

    <!-- Grid: categories -->
    <div class="gallery__grid">
      <!-- Component: category — Headphones (672:324, gap 24) -->
      <div class="gallery__category" id="headphones">
        <div class="gallery__category-images">
          <div class="gallery__category-img-wrap">
            <img
              class="gallery__category-img"
              src="@img/main/headphone-1.png"
              alt="ZYRO Headphones product shot 1"
            />
          </div>
          <div class="gallery__category-img-wrap">
            <img
              class="gallery__category-img"
              src="@img/main/headphone-2.png"
              alt="ZYRO Headphones product shot 2"
            />
          </div>
        </div>
        <a href="#" class="gallery__category-label">Headphones &amp; earbuds</a>
      </div>
      <!-- /Component: category -->

      <!-- Component: category — Speakers (672:324, gap 24) -->
      <div class="gallery__category" id="speakers">
        <div class="gallery__category-images">
          <div class="gallery__category-img-wrap">
            <img
              class="gallery__category-img"
              src="@img/main/speakers-1.png"
              alt="ZYRO Speakers product shot 1"
            />
          </div>
          <div class="gallery__category-img-wrap">
            <img
              class="gallery__category-img"
              src="@img/main/speakers-2.png"
              alt="ZYRO Speakers product shot 2"
            />
          </div>
        </div>
        <a href="#" class="gallery__category-label">Speakers</a>
      </div>
      <!-- /Component: category -->

      <!-- Component: category — Audio Sunglasses (324:672, gap 24) -->
      <div
        class="gallery__category gallery__category--reverse"
        id="audio-sunglasses"
      >
        <div class="gallery__category-images">
          <div class="gallery__category-img-wrap">
            <img
              class="gallery__category-img"
              src="@img/main/audio-sunglasses-1.png"
              alt="ZYRO Audio Sunglasses product shot 1"
            />
          </div>
          <div class="gallery__category-img-wrap">
            <img
              class="gallery__category-img"
              src="@img/main/audio-sunglasses-2.png"
              alt="ZYRO Audio Sunglasses product shot 2"
            />
          </div>
        </div>
        <a href="#" class="gallery__category-label">Audio sunglasses</a>
      </div>
      <!-- /Component: category -->
    </div>
    <!-- /Grid: categories -->
  </div>
</section>
<!-- /Section: Gallery -->
