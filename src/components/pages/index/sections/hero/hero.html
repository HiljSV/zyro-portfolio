<!-- Section: Hero                                                -->
<!-- ============================================================ -->
<section class="hero">
  <!-- Hero background image -->
  <img
    class="hero__img"
    src="@img/hero/headphones-image-1.png"
    alt="Woman wearing ZYRO headphones"
  />

  <!-- Hero overlay content: blockhead у стандартному FLS container -->
  <div class="hero__container">
    <div data-fls-blockhead class="blockhead blockhead--hero">
      <!-- Icon: sound waves -->
      <div class="blockhead__body-image">
        <img
          class="blockhead__image"
          src="@img/hero/sound-waves.png"
          alt="Sound waves"
        />
      </div>
      <!-- Heading -->
      <h1 class="blockhead__title">The world shades. Your music shines.</h1>
    </div>
  </div>
</section>
<!-- /Section: Hero -->
