<!-- ============================================================ -->
<!-- Section: Recommended                                         -->
<!-- ============================================================ -->
<section class="recommended" id="recommended">
  <div class="recommended__container">
    <!-- Section heading -->
    <div class="recommended__head">
      <div data-fls-blockhead class="blockhead blockhead--title-gallery-1">
        <h2 class="blockhead__title">Recommended</h2>
      </div>
    </div>

    <!-- Grid: product cards -->
    <div class="recommended__grid">
      <!-- Component: card — Speaker -->
      <article class="recommended__card card">
        <a
          href="#"
          class="card__image-link"
          aria-label="View Zyro Bass Tower Speaker"
        >
          <img
            class="card__image"
            src="@img/main/recommended-1.png"
            alt="Zyro Bass Tower Speaker"
          />
        </a>
        <div class="card__body">
          <h3 class="card__title">Zyro Bass Tower Speaker</h3>
          <p class="card__price">$249.00</p>
          <button type="button" class="card__btn btn">Add to cart</button>
        </div>
      </article>
      <!-- /Component: card -->

      <!-- Component: card — Over-ear Headphones -->
      <article class="recommended__card card">
        <a
          href="#"
          class="card__image-link"
          aria-label="View Zyro Air Over-Ear Headphones"
        >
          <img
            class="card__image"
            src="@img/main/recommended-2.png"
            alt="Zyro Air Over-Ear Headphones"
          />
        </a>
        <div class="card__body">
          <h3 class="card__title">Zyro Air Over-Ear Headphones</h3>
          <p class="card__price">$189.00</p>
          <button type="button" class="card__btn btn">Add to cart</button>
        </div>
      </article>
      <!-- /Component: card -->

      <!-- Component: card — Portable Speaker -->
      <article class="recommended__card card">
        <a
          href="#"
          class="card__image-link"
          aria-label="View Zyro Go Portable Speaker"
        >
          <img
            class="card__image"
            src="@img/main/recommended-3.png"
            alt="Zyro Go Portable Speaker"
          />
        </a>
        <div class="card__body">
          <h3 class="card__title">Zyro Go Portable Speaker</h3>
          <p class="card__price">$129.00</p>
          <button type="button" class="card__btn btn">Add to cart</button>
        </div>
      </article>
      <!-- /Component: card -->
    </div>
    <!-- /Grid: product cards -->
  </div>
</section>
<!-- /Section: Recommended -->
